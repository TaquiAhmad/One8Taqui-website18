<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>One8 Taqui</title>
<link rel="stylesheet" href="style.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    color:white;
}

.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
    url("banner.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.logo{
    width:140px;
    border-radius:50%;
    border:3px solid #ff0000;
    margin-bottom:20px;
}

h1{
    color:#ff3b3b;
    font-size:42px;
    margin-bottom:10px;
    text-shadow:0 0 15px red;
}

p{
    font-size:20px;
    margin-bottom:25px;
}

.btn{
    background:#ff0000;
    color:white;
    text-decoration:none;
    padding:14px 30px;
    border-radius:40px;
    font-size:18px;
    font-weight:bold;
}

.btn:hover{
    background:#cc0000;
}

.social{
    margin-top:30px;
}

.social a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-size:18px;
}

.footer{
    background:#111;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<div class="hero">

    <img src="logo.png" class="logo">

    <h1>One8 Taqui</h1>

    <p>Founder : Taqui Ahmad</p>

    <a class="btn"
       href="https://youtube.com/@One8Taqui"
       target="_blank">
       🔔 Subscribe My YouTube Channel
    </a>

    <div class="social">
        <a href="https://instagram.com/zxlr09">📷 Instagram</a>
        <a href="https://youtube.com/@One8Taqui">▶ YouTube</a>
    </div>

</div>

<div class="footer">
    © 2026 One8 Taqui | All Rights Reserved
</div>

</body>
</html>
